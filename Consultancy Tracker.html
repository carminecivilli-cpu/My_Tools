<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultancy Tracker</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7; color: #1d1d1f; min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #fff; border-bottom: 1px solid #e5e5e7;
    padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { font-size: 12px; color: #6e6e73; margin-top: 2px; }
  .add-btn {
    background: #0071e3; color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .add-btn:hover { background: #0077ed; }
  .add-btn:disabled { background: #aaa; cursor: not-allowed; }

  /* ── Layout ── */
  .page { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* ── Monthly summary card ── */
  .summary-card {
    background: #fff; border: 1.5px solid #e5e5e7; border-radius: 14px;
    padding: 18px 20px; margin-bottom: 16px;
  }
  .summary-month { font-size: 16px; font-weight: 700; color: #1d1d1f; margin-bottom: 12px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .summary-stat { }
  .summary-stat .s-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }
  .summary-stat .s-val   { font-size: 18px; font-weight: 700; color: #0071e3; margin-top: 2px; }
  .summary-stat .s-sub   { font-size: 11px; color: #888; margin-top: 1px; }

  /* ── Month filter ── */
  .month-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .month-btn {
    border: 1.5px solid #e5e5e7; border-radius: 20px; padding: 5px 14px;
    font-size: 12px; font-weight: 500; cursor: pointer; background: #fff; color: #636366;
    transition: all 0.12s;
  }
  .month-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }

  /* ── Entry cards ── */
  .entry-card {
    background: #fff; border: 1.5px solid #e5e5e7; border-radius: 12px;
    margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.15s;
  }
  .entry-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.07); }

  .entry-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 14px 16px 10px; cursor: pointer;
  }
  .entry-left { flex: 1; }
  .entry-date { font-size: 11px; color: #888; margin-bottom: 3px; }
  .entry-client { font-size: 15px; font-weight: 700; color: #1d1d1f; }
  .entry-meta { font-size: 12px; color: #888; margin-top: 3px; }

  .entry-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .hours-badge {
    background: #e8f1fb; color: #0051a8; border-radius: 8px;
    padding: 4px 10px; font-size: 13px; font-weight: 700;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer; color: #bbb;
    font-size: 14px; padding: 3px 5px; border-radius: 4px;
  }
  .icon-btn:hover { color: #555; background: #f0f0f0; }
  .icon-btn.delete:hover { color: #ff3b30; background: #fff0ee; }

  /* ── Entry detail ── */
  .entry-detail {
    display: none; border-top: 1px solid #f0f0f0;
    padding: 14px 16px 16px; background: #fafafa;
  }
  .entry-detail.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }

  .detail-block .d-label {
    font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase;
    letter-spacing: 0.4px; margin-bottom: 6px;
  }
  .detail-block .d-val { font-size: 13px; color: #3a3a3c; line-height: 1.5; }

  .expense-row {
    display: flex; justify-content: space-between; padding: 5px 0;
    border-bottom: 1px solid #ebebeb; font-size: 13px;
  }
  .expense-row:last-child { border-bottom: none; }
  .expense-total {
    display: flex; justify-content: space-between; font-size: 13px; font-weight: 700;
    border-top: 1.5px solid #e5e5e7; margin-top: 6px; padding-top: 6px;
  }
  .amt { font-weight: 600; color: #1c7a43; }

  .mileage-badge {
    display: inline-block; background: #f0e8fb; color: #7c3aed;
    border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 600; margin-bottom: 4px;
  }

  /* ── Monthly summary table ── */
  .section-label {
    font-size: 11px; font-weight: 600; color: #6e6e73; text-transform: uppercase;
    letter-spacing: 0.5px; margin: 20px 0 10px; padding-bottom: 8px;
    border-bottom: 1px solid #e5e5e7;
  }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .summary-table th {
    text-align: left; padding: 6px 10px; color: #888;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .summary-table td { padding: 9px 10px; border-top: 1px solid #f0f0f0; }
  .summary-table tr:hover td { background: #fafafa; }
  .summary-table .bold { font-weight: 700; color: #1d1d1f; }

  /* ── Loading / error ── */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 300px; gap: 14px; color: #888;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #e5e5e7;
    border-top-color: #0071e3; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner {
    background: #fff0ee; border: 1px solid #ffd0cb; border-radius: 10px;
    padding: 14px 18px; margin: 0 0 16px; font-size: 13px; color: #c0392b; display: none;
  }
  .error-banner.show { display: block; }
  .empty-state { text-align: center; padding: 50px 20px; color: #888; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 24px;
    width: 520px; max-width: 95vw; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 600; color: #6e6e73;
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .form-group input, .form-group textarea {
    width: 100%; border: 1.5px solid #e5e5e7; border-radius: 8px;
    padding: 9px 12px; font-size: 14px; font-family: inherit;
    color: #1d1d1f; background: #fafafa;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: #0071e3; background: #fff;
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .expenses-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .expenses-header label { font-size: 11px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.3px; }
  .add-exp-btn {
    background: none; border: 1.5px solid #0071e3; color: #0071e3;
    border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .add-exp-btn:hover { background: #e8f1fb; }
  .expense-input-row {
    display: grid; grid-template-columns: 1fr 90px 28px; gap: 6px; margin-bottom: 6px; align-items: center;
  }
  .expense-input-row input {
    border: 1.5px solid #e5e5e7; border-radius: 6px; padding: 7px 10px;
    font-size: 13px; font-family: inherit; background: #fafafa; color: #1d1d1f;
  }
  .expense-input-row input:focus { outline: none; border-color: #0071e3; background: #fff; }
  .remove-exp-btn {
    background: none; border: none; color: #bbb; cursor: pointer;
    font-size: 16px; border-radius: 4px; padding: 2px 4px;
  }
  .remove-exp-btn:hover { color: #ff3b30; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-secondary {
    background: #f0f0f0; color: #1d1d1f; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .btn-primary {
    background: #0071e3; color: #fff; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div>
    <h1>💼 Consultancy Tracker</h1>
    <div class="subtitle" id="header-subtitle">Loading…</div>
  </div>
  <button class="add-btn" id="add-btn" onclick="openModal()" disabled>+ Add Entry</button>
</header>

<div class="page">
  <div class="error-banner" id="error-banner"></div>
  <div id="main-content">
    <div class="loading-screen"><div class="spinner"></div><div>Loading entries…</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add Entry</h2>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>Client</label><input type="text" id="f-client" placeholder="e.g. Cornerstone"></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Start time</label><input type="time" id="f-start"></div>
      <div class="form-group"><label>End time</label><input type="time" id="f-end"></div>
      <div class="form-group"><label>Hours</label><input type="number" id="f-hours" min="0" step="0.5" placeholder="e.g. 4"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Location</label><input type="text" id="f-location" placeholder="e.g. Royal Liverpool Hospital"></div>
      <div class="form-group"><label>Mileage (miles)</label><input type="number" id="f-mileage" min="0" step="0.1" placeholder="0"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Session notes…"></textarea></div>
    <div class="form-group">
      <div class="expenses-header">
        <label>Expenses</label>
        <button class="add-exp-btn" onclick="addExpenseRow()">+ Add</button>
      </div>
      <div id="expenses-rows"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://consultancy-tracker.carminecivilli.workers.dev';
const TOKEN      = 'carm-consultancy-2026';

let allEntries  = [];
let summary     = [];
let mileageRate = 0.55;
let activeMonth = null;
let editingId   = null;
let expandedId  = null;

async function api(method, path, body) {
  const r = await fetch(WORKER_URL + path, {
    method,
    headers: { 'Authorization': `Bearer ${TOKEN}`, ...(body ? { 'Content-Type': 'application/json' } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
  return r.json();
}

async function init() {
  try {
    const data = await api('GET', '/entries');
    applyData(data);
    document.getElementById('add-btn').disabled = false;
  } catch (e) {
    showError('Could not load entries. (' + e.message + ')');
    document.getElementById('main-content').innerHTML = '';
  }
}

function applyData(data) {
  allEntries  = data.entries || [];
  summary     = data.summary || [];
  mileageRate = data.mileageRate || 0.55;
  render();
}

function render() {
  const months = [...new Set(allEntries.map(e => e.date.slice(0, 7)))].sort((a, b) => b.localeCompare(a));
  if (activeMonth && !months.includes(activeMonth)) activeMonth = null;
  const filtered = activeMonth ? allEntries.filter(e => e.date.startsWith(activeMonth)) : allEntries;

  // Header subtitle
  const total = allEntries.length;
  const cur   = summary[0] || {};
  document.getElementById('header-subtitle').textContent =
    total ? `${total} entr${total === 1 ? 'y' : 'ies'} · synced with Google Sheets` : 'No entries yet';

  let html = '';

  // ── Current month summary card ──
  if (cur.month) {
    const mLabel = fmtMonth(cur.month);
    html += `
      <div class="summary-card">
        <div class="summary-month">${mLabel}</div>
        <div class="summary-grid">
          <div class="summary-stat">
            <div class="s-label">Sessions</div>
            <div class="s-val">${cur.sessions}</div>
          </div>
          <div class="summary-stat">
            <div class="s-label">Hours</div>
            <div class="s-val">${cur.hours.toFixed(1)} h</div>
          </div>
          <div class="summary-stat">
            <div class="s-label">Expenses</div>
            <div class="s-val">£${cur.expenses.toFixed(2)}</div>
          </div>
          <div class="summary-stat">
            <div class="s-label">Mileage</div>
            <div class="s-val">${cur.mileage} mi</div>
            <div class="s-sub">£${cur.mileageReimb.toFixed(2)} reimb.</div>
          </div>
        </div>
      </div>`;
  }

  // ── Month filter ──
  if (months.length > 1) {
    html += `<div class="month-bar">
      <button class="month-btn ${!activeMonth ? 'active' : ''}" onclick="setMonth(null)">All</button>
      ${months.map(m => `<button class="month-btn ${activeMonth === m ? 'active' : ''}" onclick="setMonth('${m}')">${fmtMonth(m)}</button>`).join('')}
    </div>`;
  }

  // ── Entries ──
  if (!filtered.length) {
    html += `<div class="empty-state">📋 No entries${activeMonth ? ' this month' : ''} yet.</div>`;
  } else {
    // Group by month when showing all
    const grouped = {};
    filtered.forEach(e => {
      const m = e.date.slice(0, 7);
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(e);
    });
    Object.entries(grouped).sort(([a],[b]) => b.localeCompare(a)).forEach(([month, entries]) => {
      if (!activeMonth) {
        const ms = summary.find(s => s.month === month);
        html += `<div class="section-label">${fmtMonth(month)}${ms ? ` · ${ms.sessions} sessions · ${ms.hours.toFixed(1)}h` : ''}</div>`;
      }
      entries.forEach(e => { html += renderCard(e); });
    });
  }

  // ── All-time summary table (when > 1 month) ──
  if (summary.length > 1) {
    html += `
      <div class="section-label">Monthly Summary</div>
      <div style="background:#fff;border:1.5px solid #e5e5e7;border-radius:12px;overflow:hidden">
        <table class="summary-table">
          <thead><tr>
            <th>Month</th><th>Sessions</th><th>Hours</th>
            <th>Mileage</th><th>Mileage £</th><th>Expenses</th>
          </tr></thead>
          <tbody>
            ${summary.map(s => `<tr>
              <td class="bold">${fmtMonth(s.month)}</td>
              <td>${s.sessions}</td>
              <td>${s.hours.toFixed(1)}</td>
              <td>${s.mileage} mi</td>
              <td>£${s.mileageReimb.toFixed(2)}</td>
              <td>£${s.expenses.toFixed(2)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function renderCard(e) {
  const isOpen  = expandedId === e.id;
  const timeStr = [e.startTime, e.endTime].filter(Boolean).join(' → ');
  const metaParts = [timeStr, e.location].filter(Boolean);

  let detail = '';
  if (isOpen) {
    const blocks = [];

    if (e.expenses && e.expenses.length) {
      const expRows = e.expenses.map(ex =>
        `<div class="expense-row"><span>${esc(ex.description)}</span><span class="amt">£${Number(ex.amount).toFixed(2)}</span></div>`
      ).join('');
      blocks.push(`<div class="detail-block" style="min-width:220px">
        <div class="d-label">Expenses</div>
        <div>${expRows}</div>
        <div class="expense-total"><span>Total</span><span class="amt">£${e.totalExpenses.toFixed(2)}</span></div>
      </div>`);
    }

    if (e.mileage) {
      blocks.push(`<div class="detail-block">
        <div class="d-label">Mileage</div>
        <div class="d-val">
          <span class="mileage-badge">${e.mileage} mi</span><br>
          reimb. £${e.mileageReimb.toFixed(2)} @ £${mileageRate}/mi
        </div>
      </div>`);
    }

    if (e.notes) {
      blocks.push(`<div class="detail-block">
        <div class="d-label">Notes</div>
        <div class="d-val">${esc(e.notes)}</div>
      </div>`);
    }

    if (blocks.length) {
      detail = `<div class="entry-detail open">${blocks.join('')}</div>`;
    }
  }

  return `
    <div class="entry-card" id="card-${e.id}">
      <div class="entry-top" onclick="toggleExpand('${e.id}')">
        <div class="entry-left">
          <div class="entry-date">${formatDate(e.date)}</div>
          <div class="entry-client">${esc(e.client) || '<span style="color:#bbb;font-weight:400">No client</span>'}</div>
          ${metaParts.length ? `<div class="entry-meta">${metaParts.map(esc).join(' · ')}</div>` : ''}
        </div>
        <div class="entry-right" onclick="event.stopPropagation()">
          <span class="hours-badge">${e.hours} h</span>
          <button class="icon-btn" onclick="editEntry('${e.id}')" title="Edit">✏️</button>
          <button class="icon-btn delete" onclick="deleteEntry('${e.id}')" title="Delete">✕</button>
        </div>
      </div>
      ${detail}
    </div>`;
}

function toggleExpand(id) { expandedId = expandedId === id ? null : id; render(); }
function setMonth(m) { activeMonth = m; render(); }

// ── Mutations ──────────────────────────────────────────────────────────────
async function deleteEntry(id) {
  if (!confirm('Delete this entry and its expenses?')) return;
  try { applyData(await api('DELETE', '/entries/' + encodeURIComponent(id))); }
  catch (e) { showError('Delete failed. ' + e.message); }
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Entry' : 'Add Entry';
  document.getElementById('expenses-rows').innerHTML = '';

  if (id) {
    const e = allEntries.find(x => x.id === id);
    if (e) {
      document.getElementById('f-date').value     = e.date;
      document.getElementById('f-client').value   = e.client;
      document.getElementById('f-start').value    = e.startTime;
      document.getElementById('f-end').value      = e.endTime;
      document.getElementById('f-hours').value    = e.hours || '';
      document.getElementById('f-location').value = e.location;
      document.getElementById('f-mileage').value  = e.mileage || '';
      document.getElementById('f-notes').value    = e.notes;
      (e.expenses || []).forEach(ex => addExpenseRow(ex.description, ex.amount));
    }
  } else {
    ['f-client','f-start','f-end','f-hours','f-location','f-mileage','f-notes'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-date').focus();
}

function editEntry(id) { openModal(id); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }

function addExpenseRow(desc = '', amt = '') {
  const row = document.createElement('div');
  row.className = 'expense-input-row';
  row.innerHTML = `
    <input type="text"   class="exp-desc" placeholder="Description" value="${esc(String(desc))}">
    <input type="number" class="exp-amt"  placeholder="£0.00" step="0.01" min="0" value="${amt || ''}">
    <button class="remove-exp-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('expenses-rows').appendChild(row);
}

async function saveEntry() {
  const date = document.getElementById('f-date').value;
  if (!date) { alert('Please enter a date.'); return; }

  const expenses = [...document.querySelectorAll('.expense-input-row')].map(row => ({
    description: row.querySelector('.exp-desc').value.trim(),
    amount:      parseFloat(row.querySelector('.exp-amt').value) || 0,
  })).filter(ex => ex.description || ex.amount);

  const payload = {
    date,
    client:    document.getElementById('f-client').value.trim(),
    startTime: document.getElementById('f-start').value,
    endTime:   document.getElementById('f-end').value,
    hours:     parseFloat(document.getElementById('f-hours').value) || 0,
    location:  document.getElementById('f-location').value.trim(),
    mileage:   parseFloat(document.getElementById('f-mileage').value) || 0,
    notes:     document.getElementById('f-notes').value.trim(),
    expenses,
  };

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const data = editingId
      ? await api('PATCH', '/entries/' + encodeURIComponent(editingId), payload)
      : await api('POST', '/entries', payload);
    applyData(data);
    closeModal();
  } catch (e) {
    showError('Save failed. ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save';
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return '';
  const [y, m, dd] = d.split('-');
  if (!y || !m || !dd) return d;
  return `${parseInt(dd)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${y}`;
}
function fmtMonth(m) {
  if (!m) return '';
  const d = new Date(m + '-01');
  return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 6000);
}

// Auto-calculate hours from start/end
function calcHours() {
  const s = document.getElementById('f-start').value;
  const e = document.getElementById('f-end').value;
  if (!s || !e) return;
  const diff = (parseInt(e.replace(':','')) - parseInt(s.replace(':','')));
  if (diff > 0) {
    const h = Math.floor(diff / 100) + (diff % 100) / 60;
    document.getElementById('f-hours').value = h.toFixed(1).replace(/\.0$/, '');
  }
}
document.getElementById('f-start').addEventListener('change', calcHours);
document.getElementById('f-end').addEventListener('change', calcHours);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

init();
</script>
